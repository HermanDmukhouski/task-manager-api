services:
  postgres:
    image: postgres:17-alpine
    container_name: task_manager_postgres
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
